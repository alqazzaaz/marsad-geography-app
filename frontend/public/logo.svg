<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Marsad">
  <!-- Marsad — the observatory. An astrolabe ring holding an eight-pointed
       star (rub el hizb), the classical mark of knowledge and navigation. -->
  <circle cx="32" cy="32" r="29.5" stroke="#c9a24b" stroke-width="1.6"/>
  <circle cx="32" cy="32" r="24" stroke="#c9a24b" stroke-width="0.7" opacity="0.5"/>
  <!-- cardinal ticks on the outer ring -->
  <g stroke="#c9a24b" stroke-width="1.4" opacity="0.9">
    <line x1="32" y1="1" x2="32" y2="5.5"/>
    <line x1="32" y1="58.5" x2="32" y2="63"/>
    <line x1="1" y1="32" x2="5.5" y2="32"/>
    <line x1="58.5" y1="32" x2="63" y2="32"/>
  </g>
  <!-- eight-pointed star: two overlapping squares -->
  <g stroke="#d9b96c" stroke-width="1.5">
    <rect x="20.5" y="20.5" width="23" height="23"/>
    <rect x="20.5" y="20.5" width="23" height="23" transform="rotate(45 32 32)"/>
  </g>
  <!-- the observer's eye -->
  <circle cx="32" cy="32" r="3" fill="#c9a24b"/>
</svg>
