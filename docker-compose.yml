services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marsad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marsad}
      POSTGRES_DB: ${POSTGRES_DB:-marsad}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marsad}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-marsad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marsad}
      POSTGRES_DB: ${POSTGRES_DB:-marsad}
      # Local containers by default; point at Neon/Upstash by setting these
      # in .env (production uses Container Apps env vars instead of compose).
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: http://localhost:4200,http://localhost:8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-secret-change-me}
      MAP_EXCLUDED_COUNTRIES: ${MAP_EXCLUDED_COUNTRIES:-}
      MAP_PROMOTED_COUNTRIES: ${MAP_PROMOTED_COUNTRIES:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
