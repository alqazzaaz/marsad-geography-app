name: Keep warm

# DORMANT by design (see infra/DEPLOYMENT.md). With Container Apps at
# minReplicas: 0, the first request after idle pays a cold start. To trade a
# little Actions quota for fewer cold starts, uncomment the schedule below.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '*/10 6-22 * * *'  # every 10 min, 06:00–22:59 UTC

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          if [ -z "${{ vars.API_BASE_URL }}" ]; then
            echo "API_BASE_URL variable not set — nothing to ping."
            exit 0
          fi
          curl -fsS --max-time 30 "${{ vars.API_BASE_URL }}/api/health" && echo " — warm."
