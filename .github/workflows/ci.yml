name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install flake8 pytest
      - name: Syntax check (flake8)
        # E9/F63/F7/F82 = real errors (syntax, undefined names) â€” not style nits
        run: flake8 backend/app --select=E9,F63,F7,F82 --show-source
      - name: Run tests (if any)
        run: |
          if [ -d backend/tests ]; then
            pytest backend/tests -v
          else
            echo "No backend tests yet â€” skipping."
          fi

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Production build
        run: npm run build
        working-directory: frontend

  docker:
    name: Docker Compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        # Secrets come from GitHub Actions secrets â€” never hardcoded.
        # The build itself needs no real values; compose has safe defaults
        # for anything unset.
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: docker compose build

  # â”€â”€ CD (push to main only; skips politely until Azure secrets exist) â”€â”€

  deploy-frontend:
    name: Deploy frontend (Static Web Apps)
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check deployment is configured
        id: gate
        env:
          SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -n "$SWA_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "AZURE_STATIC_WEB_APPS_API_TOKEN not set â€” skipping deploy."
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
      - name: Inject API base URL
        if: steps.gate.outputs.enabled == 'true'
        run: |
          echo "window.MARSAD_API_BASE = '${{ vars.API_BASE_URL }}';" > frontend/public/app-config.js
          cat frontend/public/app-config.js
      - name: Deploy to Azure Static Web Apps
        if: steps.gate.outputs.enabled == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist/frontend/browser

  deploy-backend:
    name: Deploy backend (Container Apps)
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check deployment is configured
        id: gate
        env:
          AZ_CREDS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -n "$AZ_CREDS" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "AZURE_CREDENTIALS not set â€” skipping deploy."
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
      - name: Log in to GHCR
        if: steps.gate.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        if: steps.gate.outputs.enabled == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/marsad-backend
          docker build backend -t $IMAGE:${{ github.sha }} -t $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
      - name: Azure login
        if: steps.gate.outputs.enabled == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Apply container app spec (port, env, scaling)
        if: steps.gate.outputs.enabled == 'true'
        run: |
          az containerapp update -n marsad-backend -g marsad-rg \
            --yaml infra/containerapp.yaml
      - name: Roll out new revision
        if: steps.gate.outputs.enabled == 'true'
        run: |
          az containerapp update -n marsad-backend -g marsad-rg \
            --image ghcr.io/${{ github.repository_owner }}/marsad-backend:${{ github.sha }}
