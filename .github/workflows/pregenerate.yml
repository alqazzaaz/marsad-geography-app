# One-time (re-runnable) pre-generation of AI content into production.
# Trigger manually: Actions -> "Pre-generate AI content" -> Run workflow.
#
# The runner reads the Container App's secrets (database, redis, Anthropic
# key) via the same Azure credentials CD uses, then drives the Claude calls
# itself — the production container is untouched and can scale to zero.
# Safe to re-run: cached content is skipped.

name: Pre-generate AI content

on:
  workflow_dispatch:
    inputs:
      budget:
        description: "Budget ceiling for this run (USD)"
        default: "18"
        required: true
      limit:
        description: "Only the N most populous countries (0 = all)"
        default: "0"
        required: true
      dry_run:
        description: "Dry run (list what would be generated, no Claude calls)"
        type: boolean
        default: false

jobs:
  pregenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Read production connection secrets
        id: secrets
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add --name containerapp --upgrade
          SECRETS=$(az containerapp secret list -n marsad-backend -g marsad-rg --show-values -o json)
          for KEY in database-url redis-url anthropic-api-key; do
            VALUE=$(echo "$SECRETS" | jq -r ".[] | select(.name==\"$KEY\") | .value")
            echo "::add-mask::$VALUE"
            ENV_NAME=$(echo "$KEY" | tr 'a-z-' 'A-Z_')
            echo "$ENV_NAME=$VALUE" >> "$GITHUB_ENV"
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pre-generation
        working-directory: backend
        env:
          ENVIRONMENT: production
          CLAUDE_DAILY_BUDGET_USD: ${{ inputs.budget }}
          MAP_EXCLUDED_COUNTRIES: IL,ISR
          MAP_PROMOTED_COUNTRIES: PS,PSE
        run: |
          ARGS="--limit ${{ inputs.limit }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m scripts.pregenerate $ARGS
