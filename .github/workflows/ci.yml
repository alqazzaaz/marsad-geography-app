name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install flake8 pytest
      - name: Syntax check (flake8)
        # E9/F63/F7/F82 = real errors (syntax, undefined names) — not style nits
        run: flake8 backend/app --select=E9,F63,F7,F82 --show-source
      - name: Run tests (if any)
        run: |
          if [ -d backend/tests ]; then
            pytest backend/tests -v
          else
            echo "No backend tests yet — skipping."
          fi

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Production build
        run: npm run build
        working-directory: frontend

  docker:
    name: Docker Compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        # Secrets come from GitHub Actions secrets — never hardcoded.
        # The build itself needs no real values; compose has safe defaults
        # for anything unset.
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: docker compose build
